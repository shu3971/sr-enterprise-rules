mixed-port: 7890
allow-lan: false
mode: rule
log-level: info

dns:
  enable: true
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - DIRECT

rules:
  # 广告拦截 & 隐私保护
